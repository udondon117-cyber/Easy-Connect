kind = "mobile"
previewPath = "/"
title = "CaptionBridge (キャプションブリッジ)"
version = "1.0.0"
id = "artifacts/caption-bridge"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 24937
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/caption-bridge run dev"

[services.env]
PORT = "24937"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/caption-bridge", "run", "build"]
run = ["pnpm", "--filter", "@workspace/caption-bridge", "run", "serve"]
